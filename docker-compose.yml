services:

  # ─── Infrastructure ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_router
      POSTGRES_USER: ${POSTGRES_USER:-ai_router}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./gateway/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_gateway.sql
      - ./router/app/schema.sql:/docker-entrypoint-initdb.d/02_router.sql
      - ./feedback/schema.sql:/docker-entrypoint-initdb.d/03_feedback.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_router}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.6.3
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  # ─── Application Services ─────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: ../docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_router
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ai_router}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ROUTER_URL: http://router:8081
      API_KEYS: ${API_KEYS:-dev-key-123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      retries: 5

  router:
    build:
      context: ./router
      dockerfile: ../docker/Dockerfile.router
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_router}:${POSTGRES_PASSWORD:-changeme_local}@postgres:5432/ai_router
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chromadb:8000
      OLLAMA_URL: http://ollama:11434
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started

  feedback:
    build:
      context: ./feedback
      dockerfile: ../docker/Dockerfile.feedback
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_router}:${POSTGRES_PASSWORD:-changeme_local}@postgres:5432/ai_router
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Observability ────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
  grafana_data: