spring.application.name=ai-gateway

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_router}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ai_router}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme_local}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Gateway config
gateway.router-url=${ROUTER_URL:http://router:8081}
gateway.api-keys=${API_KEYS:dev-key-123}
gateway.rate-limit.requests-per-minute=60

# Actuator (health + prometheus metrics)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
