global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'router'
    static_configs:
      - targets: ['router:8081']
    metrics_path: '/metrics'

  - job_name: 'feedback'
    static_configs:
      - targets: ['feedback:8082']
    metrics_path: '/metrics'
